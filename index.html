<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Перший клікер</title>
    <style>
        h1 {
            position: absolute;
            font-size: 50px;
            right: 300px;
            top: 1px;
        }
        body {
            background-color: #383838;
        }
        #balance {
            color: green;
            font-size: 40px;
        }
        p {
            position: absolute;
            font-size: 40px;
            color: red;
            right: 20px;
            top: -20px;
        }
        #click-me {
            position: absolute;
            font-size: 100px;
            right: 180px;
            top: 190px;
            border-radius: 10px;
            background-color: #000000;
            color: white;
        }
        #shop-btn {
            position: absolute;
            padding: 15px 30px;
            font-size: 40px;
            background-color: #e74c3c;
            color: white;
            border-radius: 10px;
            margin-top: 20px;
            right: 400px;
            top: 500px;
        }
        .game-btn:active {
            background-color: #3D3D3D !important;
        }
        .magColor:active {
            background-color: #434343;
        }
    </style>
</head>
<body>

    <h1>Мій перший клікер 💰</h1>
    <p>Баланс: <span id="balance">0</span></p>
    <button id="click-me"></button>
    <button id="shop-btn">Магазин</button>

    <script>
        function updateUI() {
            scoreDisplay.textContent = money;
            baton.textContent = `Заробити +${cP}`;
            localStorage.setItem("myMoney", money);
        }
        let userName = prompt("Як вас звати?") || "Герой";
        let cP = 20;
        let savedMoney = localStorage.getItem("myMoney");
        let money = savedMoney ? Number(savedMoney) : 0;
        let baton = document.getElementById("click-me");
        baton.textContent = `Заробити +${cP}`
        let newBaton = document.getElementById("shop-btn");
        let scoreDisplay = document.getElementById("balance");
        let promoInput = document.createElement("input");
        promoInput.type = "text";
        promoInput.placeholder = "Введіть код...";
        let warning = document.createElement("button");
        warning.textContent = `Примітка: ${userName}, цей сайт тестовий, якщо ви бачите помилку - одразу кажіть`;
        document.body.appendChild(warning);
        scoreDisplay.textContent = money; 
        baton.addEventListener("click", () => {
            money += cP;
            updateUI();
        });
        let promoContainer = document.createElement("div");
        promoContainer.id = "promo-box";
        promoContainer.style.position = "absolute";
        promoContainer.style.right = "400px";
        promoContainer.style.top = "650px";
        promoContainer.style.width = "250px";
        promoContainer.style.height = "250px";
        document.body.appendChild(promoContainer);
        let promoBtn = document.createElement("button");
        promoBtn.textContent = "Активувати";
        promoContainer.appendChild(promoInput);
        promoContainer.appendChild(promoBtn);
        promoBtn.addEventListener("click", () => {
            if (promoInput.value === "KLS2026") {
                money += 1000;
                updateUI();
                alert("Промокод активовано! +1000 монет 💰");
                promoInput.value = "";
            } else {
                alert("Невірний код!");
            }
        });
        newBaton.addEventListener("click", () => {
            newBaton.style.display = "none";
            let border = document.createElement("button");
            border.textContent = "KLS";
            border.id = "border-btn";
            border.style.position = "absolute";
            border.style.left = "110px"; 
            border.style.top = "600px";
            border.style.width = "700px";
            border.style.height = "400px";
            border.style.fontSize = "1px";
            border.style.borderRadius = "15px";
            border.style.borderColor = "#FF000C";
            border.style.borderWidth = "10px";
            border.style.backgroundColor = "#000000";
            let buyPistol = document.createElement("button");
            buyPistol.textContent = "Купити Пістолет (100 монет)";
            buyPistol.id = "pistol-btn";
            buyPistol.classList.add("game-btn");
            buyPistol.style.position = "absolute";
            buyPistol.style.zIndex = "100";
            buyPistol.style.left = "320px"; 
            buyPistol.style.top = "630px";
            buyPistol.style.width = "300px";
            buyPistol.style.height = "150px";
            buyPistol.style.fontSize = "20px";
            buyPistol.style.borderRadius = "15px";
            buyPistol.style.backgroundColor = "#666666"
            let buyCarabin = document.createElement("button");
            buyCarabin.textContent = "Купити Автомат (300 монет)";
            buyCarabin.id = "carabin-btn";
            buyCarabin.classList.add("game-btn");
            buyCarabin.style.position = "absolute";
            buyCarabin.style.zIndex = "100";
            buyCarabin.style.left = "160px"; 
            buyCarabin.style.top = "780px";
            buyCarabin.style.width = "300px";
            buyCarabin.style.height = "150px";
            buyCarabin.style.fontSize = "20px";
            buyCarabin.style.borderRadius = "15px";
            buyCarabin.style.backgroundColor = "#666666";
            let buySniperRifle = document.createElement("button");
            buySniperRifle.textContent = "Купити Снайперку (600 монет)";
            buySniperRifle.id = "sniper-btn";
            buySniperRifle.classList.add("game-btn");
            buySniperRifle.style.position = "absolute";
            buySniperRifle.style.zIndex = "100";
            buySniperRifle.style.left = "460px"; 
            buySniperRifle.style.top = "780px";
            buySniperRifle.style.width = "300px";
            buySniperRifle.style.height = "150px";
            buySniperRifle.style.fontSize = "20px";
            buySniperRifle.style.borderRadius = "15px";
            buySniperRifle.style.backgroundColor = "#666666";
            let exit = document.createElement("button");
            exit.textContent = "❌";
            exit.style.position = "absolute";
            exit.style.left = "800px";
            exit.style.top = "600px";
            exit.style.height = "40px";
            exit.style.width = "40px";
            exit.style.backgroundColor = "#80FF00";
            document.body.appendChild(border);
            document.body.appendChild(buyPistol);
            document.body.appendChild(buyCarabin);
            document.body.appendChild(buySniperRifle);
            document.body.appendChild(exit);
            buyPistol.addEventListener("click", () => {
                if (money >= 100) {
                    let con = confirm(`${userName}, ви підтверджуєте покупку?`);
                    if (con === true) {
                        money -= 100;
                        cP += 5;
                        updateUI();
                        alert("Ви купили Пістолет!");
                        baton.textContent = `Заробити +${cP}`;
                        updateUI();
                    }
                }
                else if (money < 100) {
                    alert("Вам не вистачає грошей");
                }
            });
            buyCarabin.addEventListener("click", () => {
                 if (money >= 300) {
                    con = confirm(`${userName}, ви підтверджуєте покупку?`);
                    if (con === true) {
                        money -= 300;
                        cP += 15;
                        updateUI();
                        alert("Ви купили Автомат!");
                        baton.textContent = `Заробити +${cP}`;
                        updateUI();
                    }
                }
                else if (money < 300) {
                    alert("Вам не вистачає грошей");
                }
            });
            buySniperRifle.addEventListener("click", () => {
                 if (money >= 600) {
                    con = confirm(`${userName}, ви підтверджуєте покупку?`);
                    if (con === true) {
                        money -= 600;
                        cP += 30;
                        updateUI();
                        alert("Ви купили Снайперку!");
                        baton.textContent = `Заробити +${cP}`;
                        updateUI();
                    }
                }
                else if (money < 600) {
                    alert("Вам не вистачає грошей");
                }
            });
            exit.addEventListener("click", () => {
                buyPistol.remove();
                buyCarabin.remove();
                buySniperRifle.remove();
                exit.remove();
                border.remove();
                newBaton.style.display = "block";
            });
        });
    </script>

</body>
</html>
